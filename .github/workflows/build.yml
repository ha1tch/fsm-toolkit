name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GO_VERSION: '1.22'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -count=1 ./...

  # ----------------------------------------------------------------
  # Build distribution archives for each platform.
  # Each archive contains both binaries plus docs, examples, and
  # class libraries — everything needed to use the toolkit.
  # ----------------------------------------------------------------
  dist:
    name: Dist (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.label }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - goos: linux
            goarch: amd64
            label: ''
          # Linux ARM64 (AWS Graviton, modern ARM servers)
          - goos: linux
            goarch: arm64
            label: ''
          # Linux ARMv7 (Raspberry Pi 2/3/4/5 with 32-bit OS)
          - goos: linux
            goarch: arm
            goarm: '7'
            label: ' armv7'
          # Linux ARMv6 (Raspberry Pi Zero / original Pi)
          - goos: linux
            goarch: arm
            goarm: '6'
            label: ' armv6'

          # macOS Intel
          - goos: darwin
            goarch: amd64
            label: ''
          # macOS Apple Silicon
          - goos: darwin
            goarch: arm64
            label: ''

          # Windows x86_64
          - goos: windows
            goarch: amd64
            label: ''
          # Windows ARM64 (Surface Pro X, etc.)
          - goos: windows
            goarch: arm64
            label: ''

          # FreeBSD x86_64
          - goos: freebsd
            goarch: amd64
            label: ''
          # FreeBSD ARM64
          - goos: freebsd
            goarch: arm64
            label: ''

          # OpenBSD x86_64
          - goos: openbsd
            goarch: amd64
            label: ''

          # NetBSD x86_64
          - goos: netbsd
            goarch: amd64
            label: ''

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(cat VERSION)-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set archive naming
        id: naming
        run: |
          ARCH="${{ matrix.goarch }}"
          if [ "${{ matrix.goarch }}" = "arm" ] && [ -n "${{ matrix.goarm }}" ]; then
            ARCH="armv${{ matrix.goarm }}"
          fi
          NAME="fsm-toolkit-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${ARCH}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi

          VERSION="${{ steps.version.outputs.version }}"
          LDFLAGS="-s -w -X github.com/ha1tch/fsm-toolkit/pkg/version.Version=${VERSION}"

          mkdir -p staging
          go build -trimpath -ldflags "$LDFLAGS" \
            -o "staging/fsm${EXT}" ./cmd/fsm/
          go build -trimpath -ldflags "$LDFLAGS" \
            -o "staging/fsmedit${EXT}" ./cmd/fsmedit/

      - name: Assemble distribution
        run: |
          DIST="${{ steps.naming.outputs.name }}"
          mkdir -p "dist/${DIST}"

          # Binaries.
          cp staging/* "dist/${DIST}/"

          # Documentation.
          for f in LICENSE README.md MANUAL.md WORKFLOWS.md SPECIFICATION.md CHANGELOG.md MACHINES.md COMPATIBILITY.md; do
            [ -f "$f" ] && cp "$f" "dist/${DIST}/"
          done
          # Per-tool manuals.
          [ -f cmd/fsm/MANUAL.md ] && cp cmd/fsm/MANUAL.md "dist/${DIST}/FSM-CLI-MANUAL.md"
          [ -f cmd/fsmedit/MANUAL.md ] && cp cmd/fsmedit/MANUAL.md "dist/${DIST}/FSMEDIT-MANUAL.md"

          # Examples and class libraries.
          cp -r examples "dist/${DIST}/"
          cp -r class-libraries "dist/${DIST}/"

      - name: Create archive
        run: |
          cd dist
          DIST="${{ steps.naming.outputs.name }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -rq "${DIST}.zip" "${DIST}"
            echo "ARCHIVE=${DIST}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${DIST}.tar.gz" "${DIST}"
            echo "ARCHIVE=${DIST}.tar.gz" >> "$GITHUB_ENV"
          fi
          rm -rf "${DIST}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ steps.naming.outputs.arch }}
          path: dist/${{ env.ARCHIVE }}
          retention-days: 14

  # ----------------------------------------------------------------
  # Collect all archives, generate checksums, create GitHub release.
  # Only runs on version tags (v*).
  # ----------------------------------------------------------------
  release:
    name: Release
    needs: dist
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: dist-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
